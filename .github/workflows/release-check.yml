name: Release Check

on:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e bindings/python pytest

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Compile Python sources
        run: python -m compileall -q bindings/python/src bindings/python/tests examples/minimal

      - name: Run Python tests
        run: python -m pytest bindings/python/tests

      - name: Run minimal Python example
        run: python examples/minimal/python_example.py
