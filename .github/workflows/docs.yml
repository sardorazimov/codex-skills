name: Docs

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"

jobs:
  docs:
    name: Markdown sanity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f ROADMAP.md
          test -f docs/architecture/overview.md
          test -f docs/rfcs/README.md

      - name: Check architecture link from README
        run: grep -F "docs/architecture/overview.md" README.md
