name: Python

on:
  pull_request:
    paths:
      - "bindings/python/**"
      - "examples/minimal/**"
      - ".github/workflows/python.yml"
  push:
    branches: ["main"]
    paths:
      - "bindings/python/**"
      - "examples/minimal/**"
      - ".github/workflows/python.yml"

jobs:
  python:
    name: Install, check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e bindings/python pytest

      - name: Compile Python sources
        run: python -m compileall -q bindings/python/src bindings/python/tests examples/minimal

      - name: Run tests
        run: python -m pytest bindings/python/tests

      - name: Run minimal example
        run: python examples/minimal/python_example.py
